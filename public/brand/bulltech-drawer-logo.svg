<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Radial Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#05070d" />
    </radialGradient>
    
    <!-- Neon Purple Gradient for Horns and Circle -->
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    
    <!-- Tech Blue Metallic Gradient -->
    <linearGradient id="techBlue" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Ring (Isotype background) -->
  <circle cx="250" cy="250" r="210" fill="url(#techBlue)" stroke="url(#neonPurple)" stroke-width="6" filter="url(#glow)" />
  <circle cx="250" cy="250" r="195" fill="none" stroke="#243044" stroke-width="2" stroke-dasharray="8 8" />

  <!-- Bull Horns Graphic Integration -->
  <path d="M 120 180 C 120 100, 200 80, 250 160 C 300 80, 380 100, 380 180 C 380 260, 320 280, 250 210 C 180 280, 120 260, 120 180 Z" 
        fill="none" stroke="url(#neonPurple)" stroke-width="12" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)" />

  <!-- Monogram BT -->
  <g id="monogram" transform="translate(0, 30)">
    <!-- B Letter -->
    <path d="M 170 170 L 230 170 C 255 170, 255 205, 230 205 L 170 205 L 170 245 L 235 245 C 265 245, 265 210, 235 210" 
          fill="none" stroke="#f8fafc" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="170" y1="170" x2="170" y2="280" stroke="#f8fafc" stroke-width="14" stroke-linecap="round" />
    <path d="M 170 205 L 235 205 C 265 205, 265 280, 235 280 L 170 280" 
          fill="none" stroke="#f8fafc" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
          
    <!-- T Letter -->
    <line x1="270" y1="170" x2="350" y2="170" stroke="#8b5cf6" stroke-width="14" stroke-linecap="round" filter="url(#glow)" />
    <line x1="310" y1="170" x2="310" y2="280" stroke="#8b5cf6" stroke-width="14" stroke-linecap="round" filter="url(#glow)" />
  </g>

  <!-- Circular Tech Accents -->
  <circle cx="250" cy="55" r="5" fill="#38bdf8" />
  <circle cx="250" cy="445" r="5" fill="#38bdf8" />
  <circle cx="55" cy="250" r="5" fill="#38bdf8" />
  <circle cx="445" cy="250" r="5" fill="#38bdf8" />
</svg>
